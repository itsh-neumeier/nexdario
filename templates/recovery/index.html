<!DOCTYPE html>
<html lang="de" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recovery Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-red-50">
<div class="min-h-full flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full space-y-6">
    <div class="text-center">
      <div class="mx-auto h-14 w-14 rounded-full bg-red-600 flex items-center justify-center">
        <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
      </div>
      <h2 class="mt-6 text-3xl font-extrabold text-red-900">Recovery Mode</h2>
      <p class="mt-2 text-sm text-red-700">Notfallzugriff — Token erforderlich</p>
    </div>

    {% if error %}
    <div class="rounded-md bg-red-100 p-4 border border-red-300">
      <p class="text-sm font-medium text-red-800">{{ error }}</p>
    </div>
    {% endif %}
    {% if message %}
    <div class="rounded-md bg-green-100 p-4 border border-green-300">
      <p class="text-sm font-medium text-green-800">{{ message }}</p>
    </div>
    {% endif %}

    <form class="space-y-4 bg-white p-6 rounded-xl shadow-md border border-red-200" method="post" action="/recovery">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Recovery-Token</label>
        <input type="password" name="token" required
          class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500 sm:text-sm font-mono"
          placeholder="••••••••••••••••••••••••••••••••">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Aktion</label>
        <select name="action" class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-red-500 focus:border-red-500 sm:text-sm">
          <option value="reset_admin_password">Admin-Passwort zurücksetzen</option>
          <option value="clear_sessions">Alle Sitzungen beenden</option>
          <option value="disable_api_tokens">Alle API-Tokens deaktivieren</option>
        </select>
      </div>
      <div id="admin-fields">
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700 mb-1">Admin-Benutzername</label>
          <input type="text" name="username" value="{{ config.admin_username }}"
            class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm sm:text-sm font-mono">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Neues Passwort</label>
          <input type="password" name="new_password" minlength="12"
            class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm sm:text-sm"
            placeholder="Mindestens 12 Zeichen">
        </div>
      </div>
      <button type="submit"
        class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
        Aktion ausführen
      </button>
    </form>
    <p class="text-center text-xs text-red-400">Recovery Mode ist aktiv. Deaktiviere ihn nach der Nutzung (RECOVERY_MODE=false).</p>
  </div>
</div>
<script>
document.querySelector('select[name="action"]').addEventListener('change', function() {
  document.getElementById('admin-fields').style.display =
    this.value === 'reset_admin_password' ? '' : 'none';
});
</script>
</body>
</html>
