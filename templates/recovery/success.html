<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recovery erfolgreich</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full text-center">
    <div class="bg-white rounded-xl shadow-md p-8 border border-green-200">
      <div class="mx-auto h-12 w-12 rounded-full bg-green-100 flex items-center justify-center mb-4">
        <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900 mb-2">Aktion erfolgreich</h1>
      <p class="text-sm text-gray-600 mb-6">{{ message }}</p>
      <div class="bg-yellow-50 border border-yellow-200 rounded p-3 mb-4">
        <p class="text-xs text-yellow-800 font-medium">
          Deaktiviere den Recovery-Mode: Setze RECOVERY_MODE=false und starte den Container neu.
        </p>
      </div>
      <a href="/recovery" class="text-sm text-blue-600 hover:text-blue-800">← Zurück zum Recovery-Panel</a>
    </div>
  </div>
</body>
</html>
