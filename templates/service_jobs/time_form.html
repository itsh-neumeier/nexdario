{% extends "base.html" %}

{% block title %}Zeit erfassen{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Zeit erfassen</h1>
  <a href="/service-jobs/{{ job.id }}" class="btn btn-secondary">← Zurück</a>
</div>

<div class="card max-w-md">
  <p class="text-sm text-gray-600 mb-4">Einsatz: <strong>{{ job.title }}</strong></p>
  <form method="post" action="/service-jobs/{{ job.id }}/time">
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Datum / Startzeit</label>
        <input type="datetime-local" name="started_at" class="form-input">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Dauer (Minuten) <span class="text-red-500">*</span></label>
        <input type="number" name="duration_minutes" required min="1" max="1440" class="form-input" placeholder="z.B. 90">
        <p class="text-xs text-gray-400 mt-1">1 Stunde = 60 Minuten</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Aktivität</label>
        <select name="activity_type" class="form-input">
          <option value="work">Arbeit</option>
          <option value="travel">Fahrt</option>
          <option value="remote">Remote-Support</option>
          <option value="planning">Planung</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Beschreibung</label>
        <textarea name="description" rows="2" class="form-input" placeholder="Kurze Beschreibung der Tätigkeit..."></textarea>
      </div>
    </div>
    <div class="mt-6 flex gap-3">
      <button type="submit" class="btn btn-primary">Erfassen</button>
      <a href="/service-jobs/{{ job.id }}" class="btn btn-secondary">Abbrechen</a>
    </div>
  </form>
</div>
{% endblock %}
