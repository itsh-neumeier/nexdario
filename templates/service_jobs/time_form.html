{% extends "base.html" %}

{% block title %}Zeit erfassen{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Zeit erfassen</h1>
  <a href="/service-jobs/{{ job.id }}" class="btn btn-secondary">← Zurück</a>
</div>

<div class="card max-w-md">
  <p class="text-sm text-gray-600 mb-4">Einsatz: <strong>{{ job.title }}</strong></p>
  <form method="post" action="/service-jobs/{{ job.id }}/time">
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Datum</label>
        <input type="date" name="date" class="form-input">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Stunden <span class="text-red-500">*</span></label>
        <input type="number" name="hours" required step="0.25" min="0.25" max="24" class="form-input" placeholder="z.B. 2.5">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Notiz</label>
        <textarea name="notes" rows="2" class="form-input" placeholder="Kurze Beschreibung der Tätigkeit..."></textarea>
      </div>
    </div>
    <div class="mt-6 flex gap-3">
      <button type="submit" class="btn btn-primary">Erfassen</button>
      <a href="/service-jobs/{{ job.id }}" class="btn btn-secondary">Abbrechen</a>
    </div>
  </form>
</div>
{% endblock %}
