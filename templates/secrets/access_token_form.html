{% extends "base.html" %}

{% block title %}Zugriffstoken für {{ secret.name }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Zugriffstoken erstellen</h1>
  <a href="/secrets/{{ secret.id }}/reveal" class="btn btn-secondary">Abbrechen</a>
</div>

<div class="card max-w-lg">
  <p class="text-sm text-gray-600 mb-6">
    Erstelle einen zeitlich oder nutzungsbegrenzten Link, um das Secret <strong>{{ secret.name }}</strong>
    sicher mit Dritten zu teilen.
  </p>

  <form method="post" action="/secrets/{{ secret.id }}/access-token">
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Token-Typ</label>
        <select name="token_type" class="form-input" onchange="toggleExpiry(this.value)">
          <option value="one_time">Einmalig (nach Nutzung ungültig)</option>
          <option value="time_limited">Zeitlich begrenzt</option>
          <option value="daily">Täglich (bis Mitternacht)</option>
        </select>
      </div>
      <div id="expiry_field" style="display:none">
        <label class="block text-sm font-medium text-gray-700 mb-1">Ablauf am</label>
        <input type="datetime-local" name="expires_at" class="form-input">
      </div>
    </div>

    <div class="mt-6 flex gap-3">
      <button type="submit" class="btn btn-primary">Token erstellen</button>
      <a href="/secrets/{{ secret.id }}/reveal" class="btn btn-secondary">Abbrechen</a>
    </div>
  </form>
</div>

<script>
function toggleExpiry(val) {
  document.getElementById('expiry_field').style.display = val === 'time_limited' ? '' : 'none';
}
</script>
{% endblock %}
