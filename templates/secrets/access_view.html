<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret-Zugriff</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full">
    <div class="bg-white rounded-xl shadow-md p-8">
      <div class="text-center mb-6">
        <div class="mx-auto h-12 w-12 rounded-full bg-green-100 flex items-center justify-center mb-3">
          <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900">{{ secret_name }}</h1>
        <p class="text-sm text-gray-500 mt-1">Freigegebenes Secret</p>
      </div>

      <dl class="space-y-4">
        {% if username %}
        <div>
          <dt class="text-xs font-medium text-gray-500 uppercase tracking-wide">Benutzername</dt>
          <dd class="mt-1 flex items-center gap-2">
            <code class="text-sm bg-gray-100 px-3 py-1 rounded font-mono flex-1 select-all">{{ username }}</code>
            <button onclick="navigator.clipboard.writeText('{{ username }}')"
              class="text-xs text-blue-600 hover:text-blue-800 shrink-0">Kopieren</button>
          </dd>
        </div>
        {% endif %}

        <div>
          <dt class="text-xs font-medium text-gray-500 uppercase tracking-wide">Passwort</dt>
          <dd class="mt-1 flex items-center gap-2">
            <code id="pw" class="text-sm bg-gray-100 px-3 py-1 rounded font-mono flex-1 select-all">{{ password }}</code>
            <button onclick="navigator.clipboard.writeText(document.getElementById('pw').textContent)"
              class="text-xs text-blue-600 hover:text-blue-800 shrink-0">Kopieren</button>
          </dd>
        </div>

        {% if url %}
        <div>
          <dt class="text-xs font-medium text-gray-500 uppercase tracking-wide">URL</dt>
          <dd class="mt-1 text-sm">
            <a href="{{ url }}" target="_blank" class="text-blue-600 hover:underline break-all">{{ url }}</a>
          </dd>
        </div>
        {% endif %}
      </dl>

      <p class="text-xs text-gray-400 text-center mt-6">Dieser Link wurde von einem berechtigten Benutzer geteilt.</p>
    </div>
  </div>
</body>
</html>
